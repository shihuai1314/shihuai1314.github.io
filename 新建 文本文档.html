<!DOCTYPE html>
<html lang="zh-CN">
<!-- 网页头部：包含元信息、标题等 -->
<head>
    <meta charset="UTF-8">
    <!-- 适配移动端 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一个网站</title>
    <!-- 内嵌CSS样式 -->
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* 导航栏样式 */
        nav {
            background-color: #333;
            padding: 15px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
        }
        nav a:hover {
            color: #4CAF50;
        }
        /* 内容区样式 */
        .content {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .content h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .content p {
            line-height: 1.6;
            color: #666;
        }
        /* 页脚样式 */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<!-- 网页主体：可见内容 -->
<body>
    <!-- 导航栏 -->
    <nav>
        <a href="#">首页</a>
        <a href="#">关于我</a>
        <a href="#">联系方式</a>
    </nav>
    <!-- 主要内容 -->
    <div class="content">
        <h1>欢迎来到我的第一个网站！</h1>
        <p>这是用HTML+CSS构建的基础静态网站，你可以修改文字、样式，添加图片或更多页面。</p>
        <p>如果需要动态功能（比如表单提交、用户登录），还需要学习后端语言和数据库。</p>
    </div>
    <!-- 页脚 -->
    <footer>
        版权所有 © 2026 我的网站
    </footer>
</body>
</html>
